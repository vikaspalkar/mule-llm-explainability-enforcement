version: "3.3"
services:
  local-flex:
    image: mulesoft/flex-gateway:latest
    platform: linux/amd64
    environment:
      LOG_LEVEL: debug
      FLEX_LOG_LEVEL: 7
    ports:
      - 8081:8081
    volumes:
      - ./config:/usr/local/share/mulesoft/flex-gateway/conf.d/
  backend:
    image: kennethreitz/httpbin
    platform: linux/amd64